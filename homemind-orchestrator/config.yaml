name: "HomeMind Orchestrator"
version: "1.5.9"
slug: "homemind-orchestrator"
description: "Autonomous AI Agent for Home Assistant — proactive monitoring, anomaly correction and Lovelace UI generation."
url: "https://github.com/ago19800/HomeMind"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto
init: false

homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true

map:
  - config:rw
  - ssl:ro

options:
  # ── AI Providers — inserisci la API key per attivare il provider ───────────
  #
  # 🟦 GEMINI  — GRATIS 1.500 req/giorno   → https://aistudio.google.com
  gemini_api_key: ""
  gemini_model: "gemini-2.0-flash"

  # ⚡ GROQ    — GRATIS 14.400 req/giorno  → https://console.groq.com
  groq_api_key: ""
  groq_model: "llama-3.3-70b-versatile"

  # 🧠 CEREBRAS — GRATIS 1M token/min (velocissimo!) → https://cloud.cerebras.ai
  cerebras_api_key: ""
  cerebras_model: "llama3.1-8b"

  # 🔵 DEEPSEEK — quasi gratis ($0.014/1M token) → https://platform.deepseek.com
  deepseek_api_key: ""
  deepseek_model: "deepseek-chat"

  # 🟠 CLAUDE  — a pagamento             → https://console.anthropic.com
  claude_api_key: ""
  claude_model: "claude-3-5-haiku-20241022"

  # 🟢 OPENAI  — a pagamento             → https://platform.openai.com
  openai_api_key: ""
  openai_model: "gpt-4o-mini"

  # Ordine di priorità (solo i provider con API key vengono usati)
  ai_provider_order: "gemini,groq,cerebras,deepseek,claude,openai"

  # ── Telegram ─────────────────────────────────────────────────────────────
  telegram_bot_token: ""
  telegram_chat_id: ""

  # ── Home Assistant ────────────────────────────────────────────────────────
  notify_entity: ""
  alarm_code: "1234"
  spazzatura_notify_hour: "20"
  spazzatura_notify_enabled: true

  # ── Sistema ───────────────────────────────────────────────────────────────
  log_level: "info"
  person_blacklist: ""
  motion_blacklist: ""

schema:
  gemini_api_key: str
  gemini_model: str
  groq_api_key: str
  groq_model: str
  cerebras_api_key: str
  cerebras_model: str
  deepseek_api_key: str
  deepseek_model: str
  claude_api_key: str
  claude_model: str
  openai_api_key: str
  openai_model: str
  ai_provider_order: str
  telegram_bot_token: str
  telegram_chat_id: str
  notify_entity: str?
  alarm_code: str
  spazzatura_notify_hour: str
  spazzatura_notify_enabled: bool
  log_level: "list(debug|info|warning|error)"
  person_blacklist: str
  motion_blacklist: str

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "HomeMind Orchestrator Web Interface"
webui: "http://[HOST]:[PORT:8099]"
ingress: true
ingress_port: 8099
panel_icon: "mdi:brain"
panel_title: "HomeMind"
