# ============================================================
# HomeMind Orchestrator — docker-compose.yml
# 
# ISTRUZIONI:
# 1. Copia questo file in una cartella (es. ~/homemind/)
# 2. Crea un file .env nella stessa cartella con le tue chiavi
# 3. Lancia: docker-compose up -d
# ============================================================

version: "3.8"

services:
  homemind:
    image: ghcr.io/ago19800/homemind:latest
    # oppure build locale:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.standalone
    container_name: homemind
    restart: unless-stopped

    # ── Variabili obbligatorie ──────────────────────────────
    environment:
      # Home Assistant
      - HA_URL=${HA_URL}                          # es. http://192.168.1.100:8123
      - HA_TOKEN=${HA_TOKEN}                      # Long-Lived Access Token

      # Telegram
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

      # Alarm PIN (opzionale)
      - ALARM_CODE=${ALARM_CODE:-1234}

      # ── Provider AI (inserisci almeno uno) ───────────────
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}        # Gratis — aistudio.google.com
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}

      - GROQ_API_KEY=${GROQ_API_KEY:-}            # Gratis — console.groq.com
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}

      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}    # Gratis — cloud.cerebras.ai
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-llama3.1-8b}

      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}    # ~Gratis — platform.deepseek.com
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}      # Gratis tier — console.mistral.ai
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}        # A pagamento
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}        # Solo per messaggi vocali

      # Ordine priorità provider (primi disponibili usati prima)
      - AI_PROVIDER_ORDER=${AI_PROVIDER_ORDER:-gemini,groq,cerebras,deepseek,mistral,claude,openai}

      # ── Opzionali ────────────────────────────────────────
      - SPAZZATURA_NOTIFY_HOUR=${SPAZZATURA_NOTIFY_HOUR:-20}
      - SPAZZATURA_NOTIFY_ENABLED=${SPAZZATURA_NOTIFY_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ:-Europe/Rome}

    volumes:
      # Dati persistenti: person_config.json, memoria, task, ecc.
      - homemind_data:/data/homemind

    ports:
      # Dashboard web HomeMind (opzionale)
      - "${HM_PORT:-8099}:8099"

    # Stessa rete di HA se entrambi su Docker (opzionale ma consigliato)
    # networks:
    #   - homeassistant_network

volumes:
  homemind_data:
    driver: local

# Decommenta se HA e HomeMind sono sulla stessa Docker network
# networks:
#   homeassistant_network:
#     external: true
#     name: homeassistant_default
